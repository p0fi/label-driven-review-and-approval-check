name: 'label-driven-review-and-approval-check'
description: 'Label-driven review & approval check: auto-request reviews from configured approvers and enforce required approvals as a single status.'
author: 'Your Org'
branding:
  icon: 'users'
  color: 'blue'

# This action expects to be run on pull_request_target or pull_request events that include labeling,
# and optionally on a scheduled / workflow_dispatch run to re-evaluate status.
# A typical workflow will:
#  1. Trigger on: pull_request_target types [opened, labeled, unlabeled, synchronize, ready_for_review, reopened]
#  2. Provide permissions: contents: read, pull-requests: write, checks: write
#  3. Use this action with a configuration file stored in the repository default branch (for PRs from forks).
#
# The configuration file (YAML) defines labels -> approvers mapping and optional per-label thresholds.
#
# Example config (default path: .github/label-approvals.yml):
#   # Required: map of label -> { approvers: [username, ...], requiredApprovals?: N }
#   labels:
#     frontend:
#       approvers: [alice, bob, charlie]
#     backend:
#       approvers: [dave, eve, frank]
#     billing:
#       approvers: [grace, heidi]
#       requiredApprovals: 2
#   # Labels must match exactly as declared (case-sensitive).
#   # Optional: require at least N approvals per label globally (default: 1)
#   requiredApprovals: 1
#   # Optional: ignore draft PRs until marked ready (default: true)
#   ignoreDraft: true
#   # Optional: if true, retract pending review requests when label removed (default: true)
#   retractOnUnlabeled: true
#   (unknown labels are ignored; only explicitly listed labels are enforced)
#
# Behavior:
#  - When a recognized label is added, the configured approvers are requested as reviewers.
#  - The action evaluates approvals: for every configured label present, verifies required # of approvals
#    from users listed in that label's approvers array.
#  - Produces a single logical check outcome you can mark as "required" in branch protection.
#  - If any required label lacks sufficient approvals, the check is marked failure.
#  - When labels are removed and retractOnUnlabeled=true, pending review requests for that label's approvers are retracted.
#  - Dynamic: adding a new label entry in config is all that's needed (no code changes).
#
# Token: GITHUB_TOKEN with pull-requests: write, checks: write, and contents: read is sufficient.
# No org-level permissions or PAT required.

inputs:
  token:
    description: 'GitHub token with pull-requests: write, checks: write, and contents: read. The default GITHUB_TOKEN is sufficient.'
    required: false
    default: '${{ github.token }}'
  config-path:
    description: 'Path (relative to repo root) to YAML configuration.'
    required: false
    default: '.github/label-approvals.yml'
  fail-on-missing-config:
    description: 'If true, fail when the config file cannot be found.'
    required: false
    default: 'true'
  dry-run:
    description: 'If true, do not mutate (no review requests / no dismissals) - only evaluate.'
    required: false
    default: 'false'
  debug:
    description: 'Enable verbose debug logging.'
    required: false
    default: 'false'
  summary-mode:
    description: 'How much detail to include in the check summary: minimal|standard|verbose'
    required: false
    default: 'standard'

outputs:
  status:
    description: 'Overall evaluation status: success|failure|skipped'
  required_labels:
    description: 'Comma-separated list of labels that were enforced.'
  missing_approvals:
    description: 'Comma-separated list of labels still lacking required approvals (empty if passing).'

runs:
  using: 'node20'
  main: 'dist/index.js'
